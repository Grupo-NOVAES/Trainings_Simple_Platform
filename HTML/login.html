<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/login.css">
    
    <link rel="shortcut icon" href="../IMAGES/IdentidadeVisual/Logos Grupo Novaes_6.png" type="image/x-icon">
    <title>Acesso - NOVAES Treinamentos</title>
    
    <style>
        /* Ajuste fino para esconder o painel inicialmente */
        #dashboard-container { display: none; }
    </style>
</head>

<body>
    <header>
        <a href="../index.html">
            <img id="logo" src="../IMAGES/IdentidadeVisual/Logos Grupo Novaes.png" alt="Novaes Logo">
        </a>
    </header>

    <main class="container d-flex justify-content-center w-100">
        
        <div id="login-screen" class="login-wrapper">
            <h1 id="h1novaes" class="text-center">Portal de Treinamentos</h1>

            <ul class="nav nav-pills nav-fill" id="pills-tab">
                <li class="nav-item">
                    <a class="nav-link active" id="tab-aluno" onclick="switchTab('aluno')">Colaborador</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" id="tab-admin" onclick="switchTab('admin')">Admin</a>
                </li>
            </ul>

            <div id="form-aluno" class="fade-in-form mt-4">
                <p class="text-muted text-center mb-4 small">Preencha seus dados para iniciar a avaliação.</p>
                
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="input_name" placeholder="Nome">
                    <label for="input_name">Seu Nome</label>
                </div>
                
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="input_lastname" placeholder="Sobrenome">
                    <label for="input_lastname">Seu Sobrenome</label>
                </div>

                <div class="form-floating mb-4">
                    <input type="email" class="form-control" id="input_email_aluno" placeholder="name@example.com">
                    <label for="input_email_aluno">Email (Opcional)</label>
                </div>

                <button type="button" class="btn btn-primary w-100 py-3 shadow-sm" id="btn_iniciar_treinamento">
                    INICIAR TREINAMENTO
                </button>
            </div>

            <div id="form-admin" class="hidden fade-in-form mt-4">
                <p class="text-muted text-center mb-4 small">Área restrita para gestão.</p>

                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="adminEmail" placeholder="name@example.com">
                    <label for="adminEmail">Email Administrativo</label>
                </div>
                
                <div class="form-floating mb-4">
                    <input type="password" class="form-control" id="adminPass" placeholder="Senha">
                    <label for="adminPass">Senha</label>
                </div>

                <button id="btn_entrar_admin" class="btn btn-dark w-100 py-3 shadow-sm">
                    ACESSAR PAINEL
                </button>
            </div>
        </div>

        <div id="dashboard-container" class="painel fade-in-form mt-3">
            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                <h3 class="text-primary m-0">Painel Gerencial</h3>
                <button id="btnLogout" class="btn btn-outline-danger btn-sm">Sair do Sistema</button>
            </div>
            
            <ul class="nav nav-tabs nav-justified mb-4" id="adminTab" role="tablist">
                <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#config" type="button">⚙️ Configurações</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#videos" type="button">🎬 Vídeos</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#emails" type="button">📧 E-mails</button></li>
            </ul>

            <div class="tab-content">
                <div class="tab-pane fade show active" id="config">
                    <div class="alert alert-info border-0 shadow-sm">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="checkObrigatorio" style="cursor: pointer;">
                            <label class="form-check-label fw-bold" for="checkObrigatorio">Modo Estrito: Vídeos Obrigatórios</label>
                            <p class="small text-muted mb-0 mt-1">Se ativado, o botão "Próximo" ficará bloqueado até o vídeo terminar.</p>
                        </div>
                    </div>
                    <button id="btnSalvarConfig" class="btn btn-success mt-2">Salvar Alterações</button>
                </div>

                <div class="tab-pane fade" id="videos">
                    <div class="card p-3 mb-4 border-0 shadow-sm bg-light">
                        <h6 class="mb-3 text-primary">Adicionar Novo Vídeo</h6>
                        <div class="row g-2">
                            <div class="col-md-6">
                                <input type="text" id="tituloVideo" class="form-control" placeholder="Título (ex: Módulo 1)">
                            </div>
                            <div class="col-md-6">
                                <input type="text" id="urlVideo" class="form-control" placeholder="Link do YouTube">
                            </div>
                            <div class="col-12 mt-2">
                                <button id="btnAddVideo" class="btn btn-success w-100">Salvar Vídeo</button>
                            </div>
                        </div>
                    </div>
                    <h6 class="mb-3">Vídeos Ativos</h6>
                    <ul id="listaVideos" class="list-group shadow-sm"></ul>
                </div>

                <div class="tab-pane fade" id="emails">
                    <div class="card p-3 border-0 shadow-sm bg-light">
                        <h6 class="mb-3 text-primary">Destinatários dos Resultados</h6>
                        <div class="input-group mb-3">
                            <input type="email" id="novoEmail" class="form-control" placeholder="novo@email.com">
                            <button class="btn btn-primary" id="btnAddEmail">Adicionar</button>
                        </div>
                        <ul id="listaEmails" class="list-group"></ul>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        function switchTab(tab) {
            // Limpa campos ao trocar para evitar confusão visual
            document.getElementById('input_name').value = ''; 
            document.getElementById('adminPass').value = '';

            const formAluno = document.getElementById('form-aluno');
            const formAdmin = document.getElementById('form-admin');
            const tabAluno = document.getElementById('tab-aluno');
            const tabAdmin = document.getElementById('tab-admin');

            if(tab === 'aluno') {
                formAluno.classList.remove('hidden');
                formAdmin.classList.add('hidden');
                tabAluno.classList.add('active');
                tabAdmin.classList.remove('active');
            } else {
                formAluno.classList.add('hidden');
                formAdmin.classList.remove('hidden');
                tabAluno.classList.remove('active');
                tabAdmin.classList.add('active');
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../JS/login.js"></script>
    
</body>
</html>
